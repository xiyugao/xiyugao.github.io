<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>netease.me</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
text-align:center;
max-width:700px;
padding:40px;
}

.logo{
font-size:48px;
font-weight:700;
letter-spacing:2px;
margin-bottom:20px;
}

.subtitle{
font-size:18px;
opacity:.8;
margin-bottom:40px;
}

.card{
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.statement{
font-size:20px;
line-height:1.8;
margin-bottom:25px;
}

.footer{
margin-top:30px;
opacity:.6;
font-size:14px;
}

.links{
margin-top:25px;
}

.links a{
text-decoration:none;
color:white;
border:1px solid rgba(255,255,255,0.3);
padding:10px 18px;
border-radius:8px;
margin:0 6px;
transition:0.3s;
}

.links a:hover{
background:white;
color:#1a1a1a;
}

@media (max-width:600px){

.logo{
font-size:36px;
}

.statement{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">netease.me</div>

<div class="subtitle">
A simple place on the internet
</div>

<div class="card">

<div class="statement">
我希望通过自己的努力，<br>
让互联网变得更加简单、自由、开放。<br><br>

Less noise.  
More simplicity.  
A better web.
</div>

<div class="links">
<a href="#">About</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</div>

</div>

<div class="footer">
© 2026 netease.me
</div>

</div>

</body>
</html>
